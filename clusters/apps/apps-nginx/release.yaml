apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
  namespace: nginx
spec:
  interval: 5m
  chart:
    spec:
      chart: nginx
      version: "18.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h
  values:
    image:
      registry: docker.io
      repository: bitnami/nginx
      tag: 1.30.3-debian-12-r0
    replicaCount: 2
    service:
      type: ClusterIP
