apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-nginx
  namespace: flux-system
spec:
  interval: 1m    # detect drift every minute
  prune: true     # remove stale resources
  wait: true      # wait for all applied resources to become ready
  timeout: 3m     # give up after three minutes
  path: ./clusters/apps/apps-nginx
  sourceRef:
    kind: GitRepository
    name: apps
